on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  # artifact-metadata: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read env file
        id: read_env
        uses: cardinalby/export-env-action@v2
        with:
          envFile: ".env"
          export: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          context: git
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{major}}.{{minor}}.{{patch}},value=${{ steps.read_env.outputs.VERSION }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.read_env.outputs.VERSION }}
            type=semver,pattern={{major}},value=${{ steps.read_env.outputs.VERSION }}
          labels: |
            org.opencontainers.image.version.${{steps.read_env.outputs.K8SDISTRO}}=${{ steps.read_env.outputs.K8SVERSION }}
            org.opencontainers.image.version.baseimage=${{ steps.read_env.outputs.BASEIMAGE }}
            org.opencontainers.image.description="Image for local rpi4 cluster"
            org.opencontainers.image.source=https://github.com/ElKiwos/kairos-rpi4-image
          flavor: |
            latest=true
            prefix=tumbleweed-
      #
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          file: "Dockerfile"
          build-args: |
            KUBERNETES_DISTRO=${{ steps.read_env.outputs.K8SDISTRO }}
            KUBERNETES_VERSION=${{ steps.read_env.outputs.K8SVERSION }}
            VERSION=${{ steps.read_env.outputs.VERSION }}
            BASEIMAGE=${{ steps.read_env.outputs.BASEIMAGE }}

